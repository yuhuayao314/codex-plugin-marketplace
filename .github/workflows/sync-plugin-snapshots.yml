name: Sync plugin snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-plugin-snapshots
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out marketplace
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh snapshots
        run: python scripts/sync_plugin_snapshots.py

      - name: Commit changed snapshots
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Snapshots are current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins
          git commit -m "Sync plugin snapshots"
          git push
